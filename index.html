<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./img/sininho.png" type="image/x-icon">
    <link rel="stylesheet" href="inicio.css">
    <title>Fairy Game</title>
</head>

<body>

    <img src="./img/PivaGames.png" class="logoPIVA">
    <canvas id="des" width="900" height="5">
        <h2>Seu navegador não suporta gráficos</h2>
    </canvas>
    <div>
        <a href="./instrucoes.html" onclick="salvarTempo()"><img src="./img/INSTRUCOES_BOTAO.png" alt=""></a>
        <a href="./game.html"><img src="./img/JOGAR_BOTAO.png" alt=""></a>
        <a href="./desenvolv.html" onclick="salvarTempo()"><img src="./img/DESENVOLVEDORA_BOTAO.png" alt=""></a>
    </div>

    <audio id="menuMusic" loop>
        <source src="./sons/MUSIC_INICIO.mp3" type="audio/mpeg">
        Seu navegador não suporta o elemento de áudio.
    </audio>

    <script>
        const musica = document.getElementById('menuMusic')

        // tocar música ao clicar (primeira vez)
        function playMusic() {
            musica.play().catch(() => { })
            localStorage.setItem('clicou', 'true') // salva que já clicou
            document.removeEventListener('click', playMusic)
        }

        // salvar tempo ao sair
        function salvarTempo() {
            localStorage.setItem('tempoMusica', musica.currentTime)
        }

        // quando abrir a página
        window.addEventListener('load', () => {
            let tempo = localStorage.getItem('tempoMusica')
            let clicou = localStorage.getItem('clicou')

            if (tempo) {
                musica.currentTime = tempo
            }

            // tenta tocar automaticamente se já clicou antes
            if (clicou) {
                musica.play().catch(() => { })
            }
        })

        // evento de clique inicial
        document.addEventListener('click', playMusic)
    </script>
</body>

</html>
