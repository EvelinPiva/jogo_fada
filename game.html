<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="./img/sininho.png" type="image/x-icon">
    <script src="./models/Fada.js" defer></script>
    <script src="./index.js" defer></script>
    <title>Jogo da Fada</title>
</head>

<body>
    <button class="botao-voltar" onclick="voltarParaMenu()">Voltar</button>

    <audio id="menuMusic" loop>
        <source src="./sons/MUSIC_INICIO.mp3" type="audio/mpeg">
    </audio>

    <div id="tela-jogar">
        <img src="./img/FUNDO_OP_JOGAR.png" id="fundo-jogar" alt="Fundo">
        <img src="./img/BOTAO_1FADA.png" class="botao-modo" id="btn-1fada" onclick="iniciarModo(1)" alt="1 Fada">
        <img src="./img/BOTAO_2FADAS.png" class="botao-modo" id="btn-2fadas" onclick="iniciarModo(2)" alt="2 Fadas">
    </div>

    <canvas id="des" width="1280" height="700">
        <h2>Seu navegador não suporta gráficos</h2>
    </canvas>

    <script>
        const musica = document.getElementById('menuMusic')

        window.addEventListener('load', () => {
            let tempo = localStorage.getItem('tempoMusica')
            if (tempo) musica.currentTime = parseFloat(tempo)
            musica.play().catch(() => {})
        })

        function voltarParaMenu() {
            localStorage.setItem('tempoMusica', musica.currentTime)
            window.location.href = 'index.html'
        }

        function iniciarModo(modo) {
            modoJogo = modo
            estadoJogo = 'jogando'
            document.getElementById('tela-jogar').style.display = 'none'
            localStorage.setItem('tempoMusica', musica.currentTime)
            musica.pause()
        }
    </script>
</body>

</html>
